prefixes:
  waste: "https://w3id.org/def/medioambiente/residuos#"
  esdir: "https://vocab.linkeddata.es/datosabiertos/def/urbanismo-infraestructuras/direccion-postal#"
  esadm: "https://vocab.linkeddata.es/datosabiertos/def/sector-publico/territorio#"
  xsd: "http://www.w3.org/2001/XMLSchema#"
  schema: "https://schema.org/"

sources:
  mobileCollectionPoint-source: [dataset-enriquecido-2.csv~csv]

mappings:
  MobileCollectionPoint:
    sources:
      - mobileCollectionPoint-source
    s: https://w3id.org/medioambiente/recurso/residuos/collectionPoint/mobile/$(Código de distrito)-$(Tipo de vía)-$(Nombre de la vía)-$(Tipo de número)-$(Número)-$(Día de la semana)-$(Turno)-$(Hora de inicio)
    po:
      - [a, waste:MobileCollectionPoint]
      - [schema:openingHours, $(Día de la semana) $(Turno) $(Hora de inicio)-$(Hora de fin), xsd:string]
      - [schema:address, https://w3id.org/medioambiente/recurso/residuos/address/$(Código de distrito)-$(Tipo de vía)-$(Nombre de la vía)-$(Tipo de número)-$(Número)~iri]
      - [waste:admissibleWasteURL, $(Residuos admisibles), xsd:anyURI]
      - [schema:map, $(Google Maps), xsd:anyURI]
      - [waste:belongsTo, https://w3id.org/medioambiente/recurso/residuos/district/$(Distrito)~iri]

  DireccionPostal:
    sources:
      - mobileCollectionPoint-source
    s: https://w3id.org/medioambiente/recurso/residuos/address/$(Código de distrito)-$(Tipo de vía)-$(Nombre de la vía)-$(Tipo de número)-$(Número)
    po:
      - [a, esdir:DireccionPostal]
      - [esdir:direccion, $(Dirección), xsd:string]
      - [waste:secondaryAddress, $(Dirección auxiliar), xsd:string]
      - [waste:streetType, $(Tipo de vía), xsd:string]
      - [esdir:nombreDeLaVia, $(Nombre de la vía), xsd:string]
      - [waste:streetNumberType, $(Tipo de número), xsd:string]
      - [esdir:locatorName, $(Número), xsd:string]

  District:
    sources:
      - mobileCollectionPoint-source
    s: https://w3id.org/medioambiente/recurso/residuos/district/$(Distrito)
    po:
      - [a, esadm:Distrito]
      - [schema:name, $(Distrito), xsd:string]