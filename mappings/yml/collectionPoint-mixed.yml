prefixes:
  waste: "https://w3id.org/def/medioambiente/residuos#"
  esdir: "https://vocab.linkeddata.es/datosabiertos/def/urbanismo-infraestructuras/direccion-postal#"
  esadm: "https://vocab.linkeddata.es/datosabiertos/def/sector-publico/territorio#"
  xsd: "http://www.w3.org/2001/XMLSchema#"
  dcterms: "http://purl.org/dc/terms/"
  schema: "https://schema.org/"

sources:
  mixedCollectionPoint-source: [dataset-enriquecido-3.csv~csv]

mappings:
  PermanentCollectionPoint:
    sources:
      - mixedCollectionPoint-source
    s: https://w3id.org/medioambiente/recurso/residuos/collectionPoint/permanent/$(Identificador)
    po:
      - [a, waste:PermanentCollectionPoint]
      - [dcterms:identifier, $(Identificador), xsd:string]
      - [schema:name, $(Nombre), xsd:string]
      - [waste:isPubliclyOwned, $(Titularidad pública), xsd:boolean]
      - [schema:openingHours, $(Horas de apertura), xsd:string]
      - [schema:description, $(Descripción), xsd:string]
      - [schema:dateCreated, $(Fecha de creación), xsd:dateTime]
      - [schema:dateModified, $(Fecha de última actualización), xsd:dateTime]
      - [schema:address, https://w3id.org/medioambiente/recurso/residuos/address/$(Identificador)~iri]
      - [schema:contactPoint, https://w3id.org/medioambiente/recurso/residuos/contactPoint/$(Identificador)~iri]
      - [waste:belongsTo, https://w3id.org/medioambiente/recurso/residuos/district/$(Distrito)~iri]

  MobileCollectionPoint:
    sources:
      - mixedCollectionPoint-source
    s: https://w3id.org/medioambiente/recurso/residuos/collectionPoint/mobile/$(Identificador)
    po:
      - [a, waste:MobileCollectionPoint]
      - [dcterms:identifier, $(Identificador), xsd:string]
      - [schema:name, $(Nombre), xsd:string]
      - [waste:isPubliclyOwned, $(Titularidad pública), xsd:boolean]
      - [schema:openingHours, $(Horas de apertura), xsd:string]
      - [schema:description, $(Descripción), xsd:string]
      - [schema:dateCreated, $(Fecha de creación), xsd:dateTime]
      - [schema:dateModified, $(Fecha de última actualización), xsd:dateTime]
      - [schema:address, https://w3id.org/medioambiente/recurso/residuos/address/$(Identificador)~iri]
      - [schema:contactPoint, https://w3id.org/medioambiente/recurso/residuos/contactPoint/$(Identificador)~iri]
      - [waste:belongsTo, https://w3id.org/medioambiente/recurso/residuos/district/$(Distrito)~iri]

  ContactPoint:
    sources:
      - mixedCollectionPoint-source
    s: https://w3id.org/medioambiente/recurso/residuos/contactPoint/$(Identificador)
    po:
      - [a, schema:ContactPoint]
      - [schema:telephone, $(Teléfono), xsd:string]

  DireccionPostal:
    sources:
      - mixedCollectionPoint-source
    s: https://w3id.org/medioambiente/recurso/residuos/address/$(Identificador)
    po:
      - [a, esdir:DireccionPostal]
      - [esdir:direccion, $(Dirección), xsd:string]
      - [esdir:codigoPostal, $(Código postal), xsd:string]

  District:
    sources:
      - mixedCollectionPoint-source
    s: https://w3id.org/medioambiente/recurso/residuos/district/$(Distrito)
    po:
      - [a, esadm:Distrito]
      - [schema:name, $(Distrito), xsd:string]