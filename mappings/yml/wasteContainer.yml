prefixes:
  waste: "https://w3id.org/def/medioambiente/residuos#"
  wastekos: "https://w3id.org/kos/medioambiente/residuos/"
  esdir: "https://vocab.linkeddata.es/datosabiertos/def/urbanismo-infraestructuras/direccion-postal#"
  esadm: "https://vocab.linkeddata.es/datosabiertos/def/sector-publico/territorio#"
  skos: "http://www.w3.org/2004/02/skos/core#"
  gsp: "http://www.opengis.net/ont/geosparql#"
  xsd: "http://www.w3.org/2001/XMLSchema#"
  schema: "https://schema.org/"

sources:
  wasteContainer-source: [dataset-enriquecido-4.csv~csv]

mappings:
  WasteContainer:
    sources:
      - wasteContainer-source
    s: https://w3id.org/medioambiente/recurso/residuos/wasteContainer/$(Orden)
    po:
      - [a, waste:WasteContainer]
      - [waste:order, $(Orden), xsd:int]
      - [schema:model, $(Modelo), xsd:string]
      - [waste:containerBatch, $(Lote), xsd:int]
      - [waste:loadingType, $(Carga), xsd:string]
      - [waste:containerLocationCode, $(Código de localización), xsd:string]
      - [schema:address, https://w3id.org/medioambiente/recurso/residuos/address/$(Código de localización)~iri]
      - [waste:belongsTo, https://w3id.org/medioambiente/recurso/residuos/neighborhood/$(Barrio)~iri]
      - [waste:belongsTo, https://w3id.org/medioambiente/recurso/residuos/district/$(Distrito)~iri]
      - [gsp:hasGeometry, https://w3id.org/medioambiente/recurso/residuos/geometry/container/$(Código de localización)~iri]
      - [waste:acceptsWasteType, https://w3id.org/kos/medioambiente/residuos/wasteType/$(Tipo de contenedor)~iri]

  DireccionPostal:
    sources:
      - wasteContainer-source
    s: https://w3id.org/medioambiente/recurso/residuos/address/$(Código de localización)
    po:
      - [a, esdir:DireccionPostal]
      - [esdir:direccion, $(Dirección), xsd:string]

  Neighborhood:
    sources:
      - wasteContainer-source
    s: https://w3id.org/medioambiente/recurso/residuos/neighborhood/$(Barrio)
    po:
      - [a, esadm:Barrio]
      - [schema:name, $(Barrio), xsd:string]

  District:
    sources:
      - wasteContainer-source
    s: https://w3id.org/medioambiente/recurso/residuos/district/$(Distrito)
    po:
      - [a, esadm:Distrito]
      - [schema:name, $(Distrito), xsd:string]

  Geometry:
    sources:
      - wasteContainer-source
    s: https://w3id.org/medioambiente/recurso/residuos/geometry/container/$(Código de localización)
    po:
      - [a, gsp:Geometry]
      - [gsp:asWKT, POINT($(Longitud (geo)) $(Latitud (geo))), gsp:wktLiteral]

  WasteTypeConcept:
    sources:
      - wasteContainer-source
    s: https://w3id.org/kos/medioambiente/residuos/wasteType/$(Tipo de contenedor)
    po:
      - [a, skos:Concept]
      - [skos:inScheme, https://w3id.org/kos/medioambiente/residuos/wasteType~iri]
      - [skos:prefLabel, $(Tipo de contenedor), xsd:string]